<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Sistema de Horarios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a0ca3;
            --secondary: #7209b7;
            --accent: #00ffff;
            --success: #4cc9f0;
            --warning: #f8961e;
            --danger: #f72585;
            --dark: #1a1a2e;
            --darker: #0a0e17;
            --light: #f8f9fa;
            --gray: #8892b0;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar-custom {
            background: rgba(26, 26, 46, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(67, 97, 238, 0.3);
            padding: 15px 0;
        }

        .navbar-brand {
            color: var(--accent) !important;
            font-weight: 600;
            font-size: 1.5rem;
        }

        .navbar-custom .nav-link {
            color: var(--gray) !important;
            font-weight: 500;
            padding: 8px 20px !important;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        .navbar-custom .nav-link:hover,
        .navbar-custom .nav-link:focus {
            color: var(--accent) !important;
            background: rgba(67, 97, 238, 0.15);
        }

        .navbar-custom .nav-link.active {
            color: var(--accent) !important;
            background: rgba(67, 97, 238, 0.2);
            border-bottom: 2px solid var(--accent);
        }

        .container-fluid { padding: 30px; }

        h1 {
            color: white;
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 i {
            color: var(--accent);
            background: rgba(0, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            font-size: 1.8rem;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.4);
            color: white;
        }

        .card-custom {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .table-custom {
            color: white;
        }

        .table-custom th {
            background: rgba(67, 97, 238, 0.2);
            color: var(--accent);
            border-color: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            padding: 15px;
        }

        .table-custom td {
            border-color: rgba(255, 255, 255, 0.05);
            padding: 14px 15px;
            vertical-align: middle;
        }

        .table-custom tbody tr:hover {
            background: rgba(67, 97, 238, 0.08);
        }

        .badge-role {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-admin {
            background: rgba(247, 37, 133, 0.2);
            color: #f72585;
            border: 1px solid rgba(247, 37, 133, 0.4);
        }

        .badge-user {
            background: rgba(0, 255, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .badge-activo {
            background: rgba(76, 201, 240, 0.15);
            color: #4cc9f0;
            border: 1px solid rgba(76, 201, 240, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .badge-inactivo {
            background: rgba(248, 150, 30, 0.15);
            color: #f8961e;
            border: 1px solid rgba(248, 150, 30, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 2px;
        }

        .btn-edit {
            background: rgba(67, 97, 238, 0.2);
            color: #4361ee;
            border: 1px solid rgba(67, 97, 238, 0.3);
        }

        .btn-edit:hover { background: rgba(67, 97, 238, 0.35); transform: translateY(-1px); }

        .btn-delete {
            background: rgba(247, 37, 133, 0.15);
            color: #f72585;
            border: 1px solid rgba(247, 37, 133, 0.3);
        }

        .btn-delete:hover { background: rgba(247, 37, 133, 0.3); transform: translateY(-1px); }

        /* Modal */
        .modal-custom {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 1050;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: #0d1117;
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 18px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-box h4 {
            color: var(--accent);
            margin-bottom: 25px;
            font-size: 1.2rem;
        }

        .form-group-custom { margin-bottom: 18px; }

        .form-group-custom label {
            color: var(--gray);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 6px;
        }

        .form-control-custom {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-control-custom:focus {
            border-color: var(--accent);
        }

        .form-control-custom option {
            background: #0d1117;
        }

        .btn-close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn-save:hover { opacity: 0.9; }

        .alert-custom {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .alert-success {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            color: #00ff88;
        }

        .alert-error {
            background: rgba(255,65,108,0.1);
            border: 1px solid rgba(255,65,108,0.3);
            color: #ff416c;
        }

        .search-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            padding: 10px 15px;
            font-size: 0.95rem;
            outline: none;
            width: 280px;
            transition: border-color 0.3s;
        }

        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--gray); }

        .stats-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-mini {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 15px 20px;
            text-align: center;
            flex: 1;
        }

        .stat-mini .num {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-mini .lbl {
            font-size: 0.8rem;
            color: var(--gray);
        }

        #msgGlobal {
            position: fixed;
            top: 80px;
            right: 25px;
            z-index: 2000;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 0.95rem;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(30px); opacity: 0; }
            to   { transform: translateX(0);   opacity: 1; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-calendar-alt"></i> SISTEMA DE HORARIOS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="color:white;"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt me-1"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/asignaturas"><i class="fas fa-book me-1"></i> Asignaturas</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/profesores"><i class="fas fa-chalkboard-teacher me-1"></i> Profesores</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/horarios"><i class="fas fa-calendar-alt me-1"></i> Horarios</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/usuarios"><i class="fas fa-users me-1"></i> Usuarios</a></li>
                <li class="nav-item ms-3">
                    <a class="nav-link" href="/logout" style="color: #f72585 !important;">
                        <i class="fas fa-sign-out-alt me-1"></i> Salir
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div id="msgGlobal"></div>

<div class="container-fluid">
    <h1><i class="fas fa-users-cog"></i> Gestión de Usuarios</h1>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-mini"><div class="num" id="totalUsuarios">-</div><div class="lbl">Total usuarios</div></div>
        <div class="stat-mini"><div class="num" id="totalAdmins">-</div><div class="lbl">Administradores</div></div>
        <div class="stat-mini"><div class="num" id="totalNormales">-</div><div class="lbl">Usuarios normales</div></div>
        <div class="stat-mini"><div class="num" id="totalActivos">-</div><div class="lbl">Activos</div></div>
    </div>

    <!-- Toolbar -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <input class="search-input" type="text" id="busqueda" placeholder="🔍  Buscar usuario..." oninput="filtrarTabla()">
        <button class="btn-primary-custom btn" onclick="abrirModalCrear()">
            <i class="fas fa-user-plus me-2"></i> Nuevo Usuario
        </button>
    </div>

    <!-- Tabla -->
    <div class="card-custom">
        <table class="table table-custom mb-0" id="tablaUsuarios">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbodyUsuarios">
                <tr><td colspan="6" class="text-center py-4" style="color:#8892b0;">Cargando usuarios...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Crear/Editar -->
<div class="modal-custom" id="modalUsuario">
    <div class="modal-box">
        <button class="btn-close-modal" onclick="cerrarModal()">×</button>
        <h4 id="modalTitulo"><i class="fas fa-user-plus me-2"></i> Nuevo Usuario</h4>
        <div class="alert-custom" id="alertModal"></div>
        <input type="hidden" id="userId">
        <div class="form-group-custom">
            <label>Nombre de usuario *</label>
            <input type="text" id="uUsername" class="form-control-custom" placeholder="ej: juan.perez">
        </div>
        <div class="form-group-custom">
            <label>Email *</label>
            <input type="email" id="uEmail" class="form-control-custom" placeholder="ej: juan@horarios.edu">
        </div>
        <div class="form-group-custom">
            <label id="lblPassword">Contraseña *</label>
            <input type="password" id="uPassword" class="form-control-custom" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group-custom">
            <label>Rol</label>
            <select id="uRol" class="form-control-custom">
                <option value="user">Usuario normal</option>
                <option value="admin">Administrador</option>
            </select>
        </div>
        <div class="form-group-custom" id="grupoActivo" style="display:none;">
            <label>Estado</label>
            <select id="uActivo" class="form-control-custom">
                <option value="true">Activo</option>
                <option value="false">Inactivo</option>
            </select>
        </div>
        <button class="btn-save" onclick="guardarUsuario()">Guardar</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let usuarios = [];
    let modoEdicion = false;

    async function cargarUsuarios() {
        try {
            const res = await fetch('/api/admin/usuarios');
            usuarios = await res.json();
            renderTabla(usuarios);
            actualizarStats();
        } catch(e) {
            mostrarMsgGlobal('Error al cargar usuarios', 'error');
        }
    }

    function actualizarStats() {
        document.getElementById('totalUsuarios').textContent = usuarios.length;
        document.getElementById('totalAdmins').textContent = usuarios.filter(u => u.role === 'admin').length;
        document.getElementById('totalNormales').textContent = usuarios.filter(u => u.role === 'user').length;
        document.getElementById('totalActivos').textContent = usuarios.filter(u => u.activo).length;
    }

    function renderTabla(lista) {
        const tbody = document.getElementById('tbodyUsuarios');
        if (!lista.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4" style="color:#8892b0;">No hay usuarios</td></tr>';
            return;
        }
        tbody.innerHTML = lista.map(u => `
            <tr>
                <td><i class="fas fa-user me-2" style="color:#8892b0;"></i><strong>${u.username}</strong></td>
                <td style="color:#8892b0;">${u.email}</td>
                <td><span class="badge-role ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role === 'admin' ? '⚙️ Admin' : '👤 Usuario'}</span></td>
                <td><span class="${u.activo ? 'badge-activo' : 'badge-inactivo'}">${u.activo ? 'Activo' : 'Inactivo'}</span></td>
                <td style="color:#8892b0; font-size:0.85rem;">${u.fecha_registro || '-'}</td>
                <td>
                    <button class="btn-action btn-edit" onclick="abrirModalEditar(${u.id})" title="Editar"><i class="fas fa-edit"></i></button>
                    <button class="btn-action btn-delete" onclick="confirmarEliminar(${u.id}, '${u.username}')" title="Eliminar"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function filtrarTabla() {
        const q = document.getElementById('busqueda').value.toLowerCase();
        const filtrados = usuarios.filter(u =>
            u.username.toLowerCase().includes(q) ||
            u.email.toLowerCase().includes(q) ||
            u.role.toLowerCase().includes(q)
        );
        renderTabla(filtrados);
    }

    function abrirModalCrear() {
        modoEdicion = false;
        document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-user-plus me-2"></i> Nuevo Usuario';
        document.getElementById('userId').value = '';
        document.getElementById('uUsername').value = '';
        document.getElementById('uEmail').value = '';
        document.getElementById('uPassword').value = '';
        document.getElementById('uRol').value = 'user';
        document.getElementById('lblPassword').textContent = 'Contraseña *';
        document.getElementById('grupoActivo').style.display = 'none';
        ocultarAlert();
        document.getElementById('modalUsuario').style.display = 'flex';
    }

    function abrirModalEditar(id) {
        const u = usuarios.find(x => x.id === id);
        if (!u) return;
        modoEdicion = true;
        document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-user-edit me-2"></i> Editar Usuario';
        document.getElementById('userId').value = u.id;
        document.getElementById('uUsername').value = u.username;
        document.getElementById('uEmail').value = u.email;
        document.getElementById('uPassword').value = '';
        document.getElementById('uRol').value = u.role;
        document.getElementById('uActivo').value = u.activo ? 'true' : 'false';
        document.getElementById('lblPassword').textContent = 'Nueva contraseña (dejar vacío para no cambiar)';
        document.getElementById('grupoActivo').style.display = 'block';
        ocultarAlert();
        document.getElementById('modalUsuario').style.display = 'flex';
    }

    async function guardarUsuario() {
        const id = document.getElementById('userId').value;
        const username = document.getElementById('uUsername').value.trim();
        const email = document.getElementById('uEmail').value.trim();
        const password = document.getElementById('uPassword').value;
        const role = document.getElementById('uRol').value;
        const activo = document.getElementById('uActivo').value === 'true';

        if (!username || !email) { mostrarAlert('Completa los campos requeridos', 'error'); return; }
        if (!modoEdicion && !password) { mostrarAlert('La contraseña es obligatoria', 'error'); return; }

        const body = { username, email, role };
        if (password) body.password = password;
        if (modoEdicion) body.activo = activo;

        try {
            const url = modoEdicion ? `/api/admin/usuarios/${id}` : '/api/admin/usuarios';
            const method = modoEdicion ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.success) {
                cerrarModal();
                mostrarMsgGlobal(data.message, 'success');
                await cargarUsuarios();
            } else {
                mostrarAlert(data.error || 'Error al guardar', 'error');
            }
        } catch(e) {
            mostrarAlert('Error de conexión', 'error');
        }
    }

    async function confirmarEliminar(id, username) {
        if (!confirm(`¿Eliminar al usuario "${username}"? Esta acción no se puede deshacer.`)) return;
        try {
            const res = await fetch(`/api/admin/usuarios/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.success) {
                mostrarMsgGlobal(data.message, 'success');
                await cargarUsuarios();
            } else {
                mostrarMsgGlobal(data.error || 'No se pudo eliminar', 'error');
            }
        } catch(e) {
            mostrarMsgGlobal('Error de conexión', 'error');
        }
    }

    function cerrarModal() {
        document.getElementById('modalUsuario').style.display = 'none';
    }

    function mostrarAlert(msg, tipo) {
        const el = document.getElementById('alertModal');
        el.textContent = msg;
        el.className = `alert-custom alert-${tipo}`;
        el.style.display = 'block';
    }

    function ocultarAlert() {
        document.getElementById('alertModal').style.display = 'none';
    }

    function mostrarMsgGlobal(msg, tipo) {
        const el = document.getElementById('msgGlobal');
        el.textContent = msg;
        el.style.display = 'block';
        el.style.background = tipo === 'success' ? 'rgba(0,255,136,0.15)' : 'rgba(255,65,108,0.15)';
        el.style.border = tipo === 'success' ? '1px solid rgba(0,255,136,0.4)' : '1px solid rgba(255,65,108,0.4)';
        el.style.color = tipo === 'success' ? '#00ff88' : '#ff416c';
        setTimeout(() => { el.style.display = 'none'; }, 3500);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') cerrarModal();
    });

    document.getElementById('modalUsuario').addEventListener('click', e => {
        if (e.target === document.getElementById('modalUsuario')) cerrarModal();
    });

    cargarUsuarios();
</script>
</body>
</html>
