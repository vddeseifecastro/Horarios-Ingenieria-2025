<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Horarios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: #0a0e17;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #particles-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: -1;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: containerAppear 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .register-container::before {
            content: '';
            position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #00ffff 0%, #4361ee 25%, #3a0ca3 50%, #7209b7 75%, #f72585 100%);
            z-index: -1; border-radius: 27px;
            animation: borderGlow 8s linear infinite;
            background-size: 400% 400%;
        }

        .register-container::after {
            content: '';
            position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
            background: #0a0e17; border-radius: 23px; z-index: -1;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo { text-align: center; margin-bottom: 35px; }

        .logo-icon {
            font-size: 3.5rem;
            color: #00ffff;
            margin-bottom: 12px;
            display: block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00ffff, #4361ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p { color: #8892b0; font-size: 0.95rem; }

        .form-group { margin-bottom: 22px; position: relative; }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: #00ffff; font-size: 1.1rem; z-index: 2;
            transition: all 0.3s ease;
        }

        .input-field {
            width: 100%;
            padding: 16px 18px 16px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 13px;
            color: white;
            font-size: 0.97rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.1), 0 8px 25px rgba(0, 255, 255, 0.15);
            background: rgba(0, 255, 255, 0.02);
        }

        .input-field::placeholder { color: #8892b0; }

        .input-field:focus + .input-icon { color: #f72585; transform: translateY(-50%) scale(1.2); }

        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border: none; border-radius: 13px;
            color: white; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            margin-top: 10px; letter-spacing: 0.5px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(67, 97, 238, 0.4);
        }

        .btn-register:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .login-link {
            text-align: center;
            margin-top: 22px;
            color: #8892b0;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #00ffff;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .login-link a:hover { opacity: 0.8; }

        .alert-box {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            display: none;
        }

        .alert-success {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            color: #00ff88;
        }

        .alert-error {
            background: rgba(255,65,108,0.1);
            border: 1px solid rgba(255,65,108,0.3);
            color: #ff416c;
        }

        .password-hint {
            font-size: 0.78rem;
            color: #8892b0;
            margin-top: 5px;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="register-container">
        <div class="logo">
            <i class="fas fa-user-plus logo-icon"></i>
            <h1>CREAR CUENTA</h1>
            <p>Sistema de Gestión Académica</p>
        </div>

        <div class="alert-box" id="alertBox"></div>

        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" id="username" class="input-field" placeholder="Nombre de usuario" required autocomplete="username">
                <i class="fas fa-user input-icon"></i>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <input type="email" id="email" class="input-field" placeholder="Correo electrónico" required autocomplete="email">
                <i class="fas fa-envelope input-icon"></i>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <input type="password" id="password" class="input-field" placeholder="Contraseña" required autocomplete="new-password">
                <i class="fas fa-lock input-icon"></i>
            </div>
            <p class="password-hint">Mínimo 6 caracteres</p>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <input type="password" id="confirmar" class="input-field" placeholder="Confirmar contraseña" required autocomplete="new-password">
                <i class="fas fa-lock input-icon"></i>
            </div>
        </div>

        <button class="btn-register" id="btnRegistrar" onclick="registrar()">
            <i class="fas fa-user-check me-2"></i> Crear cuenta
        </button>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a>
        </div>
    </div>

    <script>
        // Partículas simples reutilizando lógica del login
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({ length: 60 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                r: Math.random() * 2 + 1,
                color: ['#00ffff','#4361ee','#f72585'][Math.floor(Math.random()*3)],
                pulse: Math.random() * Math.PI * 2
            }));
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(10,14,23,0.97)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.pulse += 0.02;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                const glow = 0.5 + Math.sin(p.pulse) * 0.5;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * glow, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();

                particles.slice(i+1).forEach(p2 => {
                    const dx = p.x-p2.x, dy = p.y-p2.y;
                    const dist = Math.sqrt(dx*dx+dy*dy);
                    if (dist < 100) {
                        ctx.strokeStyle = `rgba(0,255,255,${0.15*(1-dist/100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        animateParticles();

        // Registro
        async function registrar() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmar = document.getElementById('confirmar').value;
            const btn = document.getElementById('btnRegistrar');

            if (!username || !email || !password || !confirmar) {
                mostrarAlert('Completa todos los campos', 'error'); return;
            }
            if (password !== confirmar) {
                mostrarAlert('Las contraseñas no coinciden', 'error'); return;
            }
            if (password.length < 6) {
                mostrarAlert('La contraseña debe tener al menos 6 caracteres', 'error'); return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Creando cuenta...';

            try {
                const res = await fetch('/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    mostrarAlert('✅ Cuenta creada correctamente. Redirigiendo...', 'success');
                    setTimeout(() => window.location.href = '/login', 1800);
                } else {
                    mostrarAlert(data.error || 'Error al crear la cuenta', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-check me-2"></i> Crear cuenta';
                }
            } catch(e) {
                mostrarAlert('Error de conexión con el servidor', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-check me-2"></i> Crear cuenta';
            }
        }

        function mostrarAlert(msg, tipo) {
            const el = document.getElementById('alertBox');
            el.textContent = msg;
            el.className = `alert-box alert-${tipo}`;
            el.style.display = 'block';
        }

        // Permitir Enter para registrar
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') registrar();
        });
    </script>
</body>
</html>
